server {
  listen 80;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://tally.so; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://tally.so; frame-src https://tally.so; frame-ancestors 'self';" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

  # Root directory
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback - all routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets
  location /assets {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
